name: Finalize responsive layout
on:
  push:
    branches:
      - codex/responsive-layout-final
permissions:
  contents: write
jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/responsive-layout-final
          fetch-depth: 0
      - name: Update HTML and remove unused files
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          css = '''  <link rel="stylesheet" href="responsive-base.css" />
            <link rel="stylesheet" href="responsive-phone.css" />
            <link rel="stylesheet" href="responsive-tablet.css" />
            <link rel="stylesheet" href="responsive-desktop.css" />'''
          if 'responsive-base.css' not in text:
              text = text.replace('  <link rel="stylesheet" href="style.css" />', '  <link rel="stylesheet" href="style.css" />\n' + css)
          scripts = '''  <script src="app.js"></script>
            <script src="timeline-core.js"></script>
            <script src="timeline-resolve.js"></script>
            <script src="timeline-observer.js"></script>
            <script src="timeline-render.js"></script>'''
          if 'timeline-core.js' not in text:
              text = text.replace('  <script src="app.js"></script>', scripts)
          path.write_text(text, encoding='utf-8')
          PY
          rm -f device.css uiux-polish.css .github/workflows/finalize-responsive.yml
      - name: Commit finalized files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "レスポンシブレイアウトを最終化"
          git push origin HEAD:codex/responsive-layout-final
