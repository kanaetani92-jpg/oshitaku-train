name: Finalize resize handling
on:
  push:
    branches:
      - codex/responsive-layout-final
permissions:
  contents: write
jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/responsive-layout-final
          fetch-depth: 0
      - name: Consolidate resize handling
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('app.js')
          text = path.read_text(encoding='utf-8')
          old = "window.addEventListener('resize', () => { if (state.timelineMode === 'auto') render(); });"
          new = "window.addEventListener('resize', () => {\n      if (typeof scheduleTimelineLayoutRefresh === 'function') scheduleTimelineLayoutRefresh();\n      else if (state.timelineMode === 'auto') render();\n    }, { passive:true });"
          if old not in text:
              raise SystemExit('resize listener not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm -f .github/workflows/finalize-resize.yml
      - name: Commit finalized resize handling
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "リサイズ処理を共通スケジューラへ統合"
          git push origin HEAD:codex/responsive-layout-final
